<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/assets/styles-CJ0qpnHN.css" data-precedence="default">
    <title>معاون لخدمات القوى البشرية — قطر</title>
    <script>
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            var message = [
                'Message: ' + msg,
                'URL: ' + url,
                'Line: ' + lineNo,
                'Column: ' + columnNo,
                'Error object: ' + JSON.stringify(error)
            ].join(' - ');
            console.log("CRITICAL ERROR: " + message);
            document.body.innerHTML += '<div style="color:red;padding:20px;background:white;position:fixed;top:0;z-index:9999">خطأ في التحميل: ' + msg + '</div>';
            return false;
        };
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/assets/index-Dq-H0M4e.js"></script>
</body>
</html>
