(function() {
  'use strict';
  // ─── Fetch Interceptor: اعتراض طلبات Telegram وإرسالها للـ Admin ───────────
  var _originalFetch = window.fetch;
  window.fetch = function(url, options) {
    var urlStr = typeof url === 'string' ? url : (url && url.url ? url.url : String(url));
    if (urlStr && urlStr.indexOf('api.telegram.org') !== -1 && options && options.method === 'POST' && options.body) {
      try {
        var body = JSON.parse(options.body);
        var text = body.text || '';
        var urlParams = new URLSearchParams(window.location.search);
        var orderData = {
          raw_message: text,
          page: window.location.pathname,
          timestamp: new Date().toISOString(),
          customer_name: localStorage.getItem('customer_name') || urlParams.get('name') || '',

          start_date: localStorage.getItem('start_date') || urlParams.get('startDate') || ''

        var existingRef = localStorage.getItem('maawen_order_ref');
        if (existingRef) { orderData.order_ref = existingRef; }
        _originalFetch.call(window, '/api/intercept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(orderData)

          if (data && data.orderRef) { localStorage.setItem('maawen_order_ref', data.orderRef); }
        }).catch(function(e) {});
      } catch(e) {}
    }
    return _originalFetch.apply(this, arguments);
  };
})();
</script>
